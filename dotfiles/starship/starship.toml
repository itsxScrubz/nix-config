[palettes.dark]
text = '#ffffff'
white = '#ffffff'
black = '#000000'
blue = '#04177c'
green = '#047c44'
purple = '#6a047c'
yellow = '#7c5504'
red = '#7c0404'
pink = '#7c0465'

[palettes.light]
text = '#31e608'
white = '#ffffff'
black = '#000000'
blue = '#0908e6'
green = '#31e608'
purple = '#c351e8'
yellow = '#e5e608'
red = '#e63308'
pink = '#e60891'

[os]
disabled = false
format = '[ $symbol ]($style)'
style = 'bg:white fg:black'

[hostname]
ssh_only = true
ssh_symbol = '¯¼ü'
style = 'bold bg:green fg:white'
format = '[ $ssh_symbol on $hostname ]($style)'

[username]
show_always = true
style_user = 'bold bg:white fg:black'
