"$schema" = 'https://starship.rs/config-schema.json'

palette = 'light'
add_newline = false

format = """
[ÔûæÔûÆÔûô](white)\
$os\
$username\
$hostname\
[¯é┤](bg:purple fg:white)\
$directory\
[¯é░](bg:yellow fg:purple)\
